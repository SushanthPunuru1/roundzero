# RoundZero — Drill cards (Foundations + core Linux/Windows)
# Location in repo: packages/content/cards/core.yaml
#
# Synced to the DrillCard model by the seed script. Scheduling is handled by
# ts-fsrs against UserCardState — nothing about scheduling lives here.
#
# AUTHORING RULES
# - One card = one atomic retrieval. If a card needs "and", split it.
# - front: the prompt. back: the answer, short enough to grade at a glance.
# - type CONCEPT = why/what.  type COMMAND = exact syntax recalled cold.
# - Every card references a taxonomy skill node id.
# - id format: card.<skill.node.id>.<short-suffix>
# - Cards teach the general competition, never one team's setup.

version: 1

cards:
  # === FOUNDATIONS — competition literacy ================================
  - id: card.foundations.competition.scoring-engine.state
    skillNodeId: foundations.competition.scoring-engine
    type: CONCEPT
    front: "What does the scoring engine actually evaluate?"
    back: "The current STATE of the machine — files, users, services, settings. Not your actions, not how you got there."

  - id: card.foundations.competition.scoring-engine.cycle
    skillNodeId: foundations.competition.scoring-engine
    type: CONCEPT
    front: "You fix something and the score doesn't move ten seconds later. What's happening?"
    back: "Nothing is wrong. The engine checks on a timer. Change, wait a cycle, then verify."

  - id: card.foundations.competition.scoring-engine.drop
    skillNodeId: foundations.competition.scoring-engine
    type: CONCEPT
    front: "Your score DROPS. What is the first question to ask?"
    back: "What did we change most recently? Score drops are penalties — almost always self-inflicted by the last change."

  - id: card.foundations.competition.scoring-engine.penalty-source
    skillNodeId: foundations.competition.scoring-engine
    type: CONCEPT
    front: "Where do penalties most often come from?"
    back: "Breaking something the scenario requires: stopping a critical service, deleting an authorized user, removing required software."

  - id: card.foundations.competition.readme.four-lists
    skillNodeId: foundations.competition.readme
    type: CONCEPT
    front: "What four lists do you extract from the README before touching anything?"
    back: "1) Authorized administrators  2) Authorized standard users  3) Required services and software  4) Explicit instructions (do's and do-not's)"

  - id: card.foundations.competition.readme.suspicious
    skillNodeId: foundations.competition.readme
    type: CONCEPT
    front: "You find a user named 'hackerman'. Delete it?"
    back: "Only if it is NOT on the README's authorized list. 'Looks suspicious' is not a reason. 'Not authorized' is."

  - id: card.foundations.competition.readme.required-insecure
    skillNodeId: foundations.competition.readme
    type: CONCEPT
    front: "The README requires FTP, but FTP is insecure. What do you do?"
    back: "Keep it running and harden its configuration. Removing or stopping a required service is a penalty."

  - id: card.foundations.competition.readme.forensics-first
    skillNodeId: forensics.core.answer-format
    type: CONCEPT
    front: "Why must you read the forensics questions BEFORE fixing vulnerabilities?"
    back: "Fixing a vuln can destroy the evidence a question asks about — the user you deleted, the file you removed."

  - id: card.foundations.competition.safe-change.backup
    skillNodeId: foundations.competition.safe-change
    type: CONCEPT
    front: "What is the first step before editing any config file?"
    back: "Back it up. `cp file file.bak` on Linux; `reg export` the key on Windows. It turns a disaster into a 30-second revert."

  - id: card.foundations.competition.safe-change.verify
    skillNodeId: foundations.competition.safe-change
    type: CONCEPT
    front: "After a change, 'verify' means checking which three things?"
    back: "1) The service still runs  2) The behavior still works (can you still log in?)  3) The score report registered it and nothing went red."

  - id: card.meta.strategy.change-log.line
    skillNodeId: meta.strategy.change-log
    type: CONCEPT
    front: "What four things go in every change-log line?"
    back: "Time, what changed, why, and the result. Example: 14:32 — PermitRootLogin no — README hardening — +3, ssh still up."

  - id: card.meta.strategy.point-strategy.updates
    skillNodeId: meta.strategy.point-strategy
    type: CONCEPT
    front: "When in the round do you start the system update?"
    back: "Early. Updates are slow and are scored. Never start one with ten minutes left."

  # === LINUX — accounts ==================================================
  - id: card.linux.accounts.uid0.cmd
    skillNodeId: linux.accounts.uid0
    type: COMMAND
    front: "Linux: list every account with UID 0."
    back: "awk -F: '$3==0 {print $1}' /etc/passwd    # should print only: root"

  - id: card.linux.accounts.passwd-shadow.humans
    skillNodeId: linux.accounts.passwd-shadow
    type: COMMAND
    front: "Linux: list the human user accounts (UID >= 1000)."
    back: "awk -F: '$3>=1000 && $3<65534 {print $1}' /etc/passwd"

  - id: card.linux.accounts.passwd-shadow.blank
    skillNodeId: linux.accounts.passwd-shadow
    type: COMMAND
    front: "Linux: find accounts with a blank password."
    back: "sudo awk -F: '($2==\"\"){print $1}' /etc/shadow"

  - id: card.linux.accounts.sudoers.who
    skillNodeId: linux.accounts.sudoers
    type: COMMAND
    front: "Linux: who is in the sudo group, and how do you remove someone?"
    back: "getent group sudo    then:    sudo deluser baduser sudo"

  - id: card.linux.accounts.sudoers.visudo
    skillNodeId: linux.accounts.sudoers
    type: CONCEPT
    front: "Why edit /etc/sudoers with visudo instead of a text editor?"
    back: "visudo checks syntax before saving. A broken sudoers file can lock you out of sudo entirely."

  - id: card.linux.accounts.sudoers.nopasswd
    skillNodeId: linux.accounts.sudoers
    type: COMMAND
    front: "Linux: find NOPASSWD rules anywhere in the sudo config."
    back: "sudo grep -r NOPASSWD /etc/sudoers /etc/sudoers.d/"

  - id: card.linux.accounts.chage.cmd
    skillNodeId: linux.accounts.chage
    type: COMMAND
    front: "Linux: set max age 90, min age 7, warning 14 for an existing user."
    back: "sudo chage -M 90 -m 7 -W 14 username    (defaults for new passwords live in /etc/login.defs)"

  # === LINUX — PAM =======================================================
  - id: card.linux.pam.pwquality.file
    skillNodeId: linux.pam.pwquality
    type: COMMAND
    front: "Linux: which file holds password length and complexity rules, and what package provides it?"
    back: "/etc/security/pwquality.conf — provided by libpam-pwquality. Set minlen, and dcredit/ucredit/ocredit/lcredit = -1."

  - id: card.linux.pam.pwquality.credit
    skillNodeId: linux.pam.pwquality
    type: CONCEPT
    front: "In pwquality.conf, what does `dcredit = -1` mean?"
    back: "Require AT LEAST ONE digit. Negative = minimum required of that class. (Positive would mean 'credit toward length'.)"

  - id: card.linux.pam.faillock.file
    skillNodeId: linux.pam.faillock
    type: COMMAND
    front: "Linux: which module and file control account lockout on modern Ubuntu?"
    back: "pam_faillock, configured in /etc/security/faillock.conf (deny, fail_interval, unlock_time). It replaced pam_tally2."

  # === LINUX — SSH =======================================================
  - id: card.linux.ssh.permitrootlogin.cmd
    skillNodeId: linux.ssh.permitrootlogin
    type: COMMAND
    front: "Linux: disable root SSH login, then safely apply it."
    back: "Set `PermitRootLogin no` in /etc/ssh/sshd_config, then:  sudo sshd -t && sudo systemctl restart ssh"

  - id: card.linux.ssh.permitrootlogin.test
    skillNodeId: linux.ssh.permitrootlogin
    type: CONCEPT
    front: "Why run `sudo sshd -t` before restarting SSH?"
    back: "It tests the config for syntax errors. Restarting with a broken config can kill SSH — a penalty if SSH is required."

  - id: card.linux.ssh.passwordauth.trap
    skillNodeId: linux.ssh.passwordauth
    type: CONCEPT
    front: "You set PasswordAuthentication in sshd_config on Ubuntu 24 and nothing changes. Why?"
    back: "A drop-in file in /etc/ssh/sshd_config.d/ (often 50-cloud-init.conf) overrides it. Fix it there and confirm with `sshd -T`."

  - id: card.linux.ssh.passwordauth.verify
    skillNodeId: linux.ssh.passwordauth
    type: COMMAND
    front: "Linux: how do you check SSH's MERGED effective config (not just the file)?"
    back: "sudo sshd -T | grep -i <setting>     e.g.  sudo sshd -T | grep -i permitrootlogin"

  # === LINUX — services, persistence, files ==============================
  - id: card.linux.services.listening
    skillNodeId: linux.services-persistence.systemd-audit
    type: COMMAND
    front: "Linux: show every listening port with the process that owns it."
    back: "sudo ss -tulpn"

  - id: card.linux.services.disable
    skillNodeId: linux.services-persistence.systemd-audit
    type: COMMAND
    front: "Linux: stop a service now AND prevent it starting at boot, in one command."
    back: "sudo systemctl disable --now <service>"

  - id: card.linux.persistence.cron.places
    skillNodeId: linux.services-persistence.cron
    type: COMMAND
    front: "Linux: name the cron locations you must check for persistence."
    back: "/etc/crontab, /etc/cron.d/, /etc/cron.{hourly,daily,weekly,monthly}/, and per-user: /var/spool/cron/crontabs/"

  - id: card.linux.persistence.authorized-keys.cmd
    skillNodeId: linux.services-persistence.authorized-keys
    type: COMMAND
    front: "Linux: find every authorized_keys file on the system."
    back: "sudo find /home /root -name authorized_keys    # a rogue key survives a password change"

  - id: card.linux.files.suid.cmd
    skillNodeId: linux.files-perms.suid
    type: COMMAND
    front: "Linux: find all SUID binaries."
    back: "sudo find / -perm -4000 -type f 2>/dev/null"

  - id: card.linux.files.suid.why
    skillNodeId: linux.files-perms.suid
    type: CONCEPT
    front: "Why is an unexpected SUID binary dangerous?"
    back: "It runs with the file owner's privileges (often root) regardless of who executes it — instant privilege escalation."

  - id: card.linux.files.sensitive-modes.cmd
    skillNodeId: linux.files-perms.sensitive-modes
    type: COMMAND
    front: "Linux: what are the correct modes for /etc/shadow, /etc/passwd, and /etc/sudoers?"
    back: "shadow 640, passwd 644, sudoers 440. World-readable /etc/shadow is a scored finding."

  - id: card.linux.network.ufw.order
    skillNodeId: linux.updates-network.ufw
    type: CONCEPT
    front: "What must you do BEFORE running `sudo ufw enable` on a remote box?"
    back: "Allow the required services first — `sudo ufw allow OpenSSH`. Enabling first can cut your own access."

  # === WINDOWS — accounts and policy =====================================
  - id: card.windows.account-policy.complexity.trap
    skillNodeId: windows.account-policy.complexity
    type: CONCEPT
    front: "Windows: can you enable password complexity with `net accounts`?"
    back: "No. `net accounts` does length/age/history/lockout only. Complexity needs secpol.msc, or secedit export/edit/import."

  - id: card.windows.account-policy.length-age-history.cmd
    skillNodeId: windows.account-policy.length-age-history
    type: COMMAND
    front: "Windows: set min length 14, max age 90, min age 1, history 5 — one command."
    back: "net accounts /minpwlen:14 /maxpwage:90 /minpwage:1 /uniquepw:5     (verify with: net accounts)"

  - id: card.windows.account-policy.lockout.cmd
    skillNodeId: windows.account-policy.lockout
    type: COMMAND
    front: "Windows: set lockout threshold 5, duration 30, reset window 30."
    back: "net accounts /lockoutthreshold:5 /lockoutduration:30 /lockoutwindow:30"

  - id: card.windows.users-groups.unauthorized-users.cmd
    skillNodeId: windows.users-groups.unauthorized-users
    type: COMMAND
    front: "Windows: list local users, and list who is in Administrators."
    back: "Get-LocalUser | Select Name,Enabled     and     Get-LocalGroupMember -Group \"Administrators\""

  - id: card.windows.users-groups.never-expires.cmd
    skillNodeId: windows.users-groups.never-expires
    type: COMMAND
    front: "Windows: find accounts whose password never expires."
    back: "Get-LocalUser | Where-Object { $_.PasswordExpires -eq $null -and $_.Enabled }"

  - id: card.windows.policy-registry.uac.key
    skillNodeId: windows.policy-registry.uac
    type: COMMAND
    front: "Windows: which registry value turns UAC on, and where?"
    back: "EnableLUA = 1 under HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"

  - id: card.windows.policy-registry.smb.cmd
    skillNodeId: windows.policy-registry.smb
    type: COMMAND
    front: "Windows: disable SMBv1."
    back: "Disable-WindowsOptionalFeature -Online -FeatureName SMB1Protocol -NoRestart"

  - id: card.windows.policy-registry.rdp.nla
    skillNodeId: windows.policy-registry.rdp
    type: CONCEPT
    front: "Windows: the README requires RDP. What do you do instead of disabling it?"
    back: "Require Network Level Authentication (UserAuthentication = 1 under the RDP-Tcp key)."

  - id: card.windows.defenses-updates.defender.firewall
    skillNodeId: windows.defenses-updates.defender
    type: COMMAND
    front: "Windows: enable the firewall on ALL profiles."
    back: "Set-NetFirewallProfile -Profile Domain,Private,Public -Enabled True    # teams often enable one and miss two"

  - id: card.windows.defenses-updates.defender.status
    skillNodeId: windows.defenses-updates.defender
    type: COMMAND
    front: "Windows: check whether Defender real-time protection is on."
    back: "Get-MpComputerStatus | Select RealTimeProtectionEnabled,AntivirusEnabled"

  - id: card.windows.persistence.run-keys.where
    skillNodeId: windows.persistence.run-keys
    type: COMMAND
    front: "Windows: name the two Run keys to audit for persistence."
    back: "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Run  and  HKCU\\...\\Run  (plus RunOnce and the StartUp folder)"

  - id: card.windows.persistence.scheduled-tasks.cmd
    skillNodeId: windows.persistence.scheduled-tasks
    type: COMMAND
    front: "Windows: list enabled scheduled tasks."
    back: "Get-ScheduledTask | Where-Object {$_.State -ne \"Disabled\"} | Select TaskName,TaskPath"

  - id: card.windows.defenses-updates.prohibited.hosts
    skillNodeId: windows.defenses-updates.prohibited
    type: COMMAND
    front: "Windows: where is the hosts file, and what does a clean one contain?"
    back: "C:\\Windows\\System32\\drivers\\etc\\hosts — only comment lines (#) and possibly 127.0.0.1 localhost."

  # === FORENSICS =========================================================
  - id: card.forensics.core.ports.cmd
    skillNodeId: forensics.core.ports
    type: COMMAND
    front: "Which listening-port command on each OS?"
    back: "Linux: sudo ss -tulpn     Windows: netstat -ano | findstr LISTENING"

  - id: card.forensics.core.hashing.cmd
    skillNodeId: forensics.core.hashing
    type: COMMAND
    front: "Hash a file on each OS."
    back: "Linux: md5sum file    (or sha256sum)     Windows: certutil -hashfile file MD5"

  - id: card.forensics.core.login-history.cmd
    skillNodeId: forensics.core.login-history
    type: COMMAND
    front: "Show login history on each OS."
    back: "Linux: last     Windows: Event Viewer, Security log, Event ID 4624 (successful logon)"

  - id: card.forensics.core.decoding.cmd
    skillNodeId: forensics.core.decoding
    type: COMMAND
    front: "Decode a base64 string on Linux."
    back: "echo 'c3RyaW5n' | base64 -d"

  - id: card.forensics.core.answer-format.rule
    skillNodeId: forensics.core.answer-format
    type: CONCEPT
    front: "You solved a forensics question but got zero points. Most likely cause?"
    back: "Wrong answer format. Match the requested format exactly — the question states it."

  # === NETWORKING ========================================================
  - id: card.networking.fundamentals.tcp-udp.ports
    skillNodeId: networking.fundamentals.tcp-udp
    type: CONCEPT
    front: "Ports: FTP, SSH, Telnet, SMTP, DNS, HTTP, HTTPS, SMB, RDP."
    back: "21, 22, 23, 25, 53, 80, 443, 445, 3389"

  - id: card.networking.fundamentals.osi.layers
    skillNodeId: networking.fundamentals.osi
    type: CONCEPT
    front: "The seven OSI layers, 1 to 7."
    back: "Physical, Data Link, Network, Transport, Session, Presentation, Application"

  - id: card.networking.fundamentals.subnetting.slash24
    skillNodeId: networking.fundamentals.subnetting
    type: CONCEPT
    front: "How many usable hosts in a /24? In a /26?"
    back: "/24 → 254 usable (256 − network − broadcast).  /26 → 62 usable (64 − 2)."
